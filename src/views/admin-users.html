<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إدارة المستخدمين — نظام مرور سبها</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  
  

  <div id="sidebar-container"></div>
  <script src="/js/sidebar.js"></script>
  <div class="main-content">
    <div class="page-wrapper">

      <div class="page-header">
        <div>
          <div class="breadcrumb">
            <a href="/dashboard">الرئيسية</a>
            <span class="breadcrumb-sep">›</span>
            <span>المستخدمون</span>
          </div>
          <h1 class="page-title">إدارة المستخدمين</h1>
          <p class="page-subtitle">إضافة وإدارة حسابات الموظفين والمواطنين</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="openAdd()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            إضافة مستخدم
          </button>
        </div>
      </div>

      <div class="card">
        <div class="search-bar">
          <div class="input-wrap search-input">
            <span class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </span>
            <input class="form-input" id="q" placeholder="بحث بالاسم أو الرقم الوطني أو الهاتف...">
          </div>
          <select class="form-select" id="role-filter" style="width:175px;">
            <option value="">كل الأدوار</option>
            <option value="ADMIN">مدير النظام</option>
            <option value="REG_CHIEF">رئيس التسجيل</option>
            <option value="INSP_CHIEF">رئيس الفحص</option>
            <option value="PLATE_DEPT">قسم اللوحات</option>
            <option value="OFFICER">ضابط ميداني</option>
            <option value="CITIZEN">مواطن</option>
          </select>
        </div>

        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>#</th>
                <th>المستخدم</th>
                <th>الرقم الوطني</th>
                <th>الدور</th>
                <th>الهاتف</th>
                <th>آخر دخول</th>
                <th>الحالة</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tbody">
              <tr><td colspan="8"><div class="empty"><p>جارٍ التحميل...</p></div></td></tr>
            </tbody>
          </table>
        </div>

        <div class="pagination">
          <span class="pg-info" id="pg-info">—</span>
          <div class="pg-btns">
            <button class="btn btn-secondary btn-sm" id="pg-prev" onclick="pg(-1)" disabled>السابق</button>
            <button class="btn btn-secondary btn-sm" id="pg-next" onclick="pg(1)">التالي</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal إضافة مستخدم -->
  <div id="add-modal" class="modal-backdrop" style="display:none;" onclick="if(event.target===this)closeAdd()">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">إضافة مستخدم جديد</span>
        <button class="modal-close" onclick="closeAdd()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div id="modal-err" class="alert alert-error" style="display:none;"></div>
        <div class="form-group">
          <label class="form-label">الاسم الكامل <span class="req">*</span></label>
          <input class="form-input" id="f-name" placeholder="مثال: محمد أحمد الورفلي">
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label">الرقم الوطني <span class="req">*</span></label>
            <input class="form-input" id="f-nid" placeholder="12 رقم" maxlength="12" inputmode="numeric">
            <p class="form-hint">يبدأ بـ 1 ذكر أو 2 أنثى</p>
          </div>
          <div class="form-group">
            <label class="form-label">رقم الهاتف</label>
            <input class="form-input" id="f-phone" placeholder="09XXXXXXXX" inputmode="numeric">
          </div>
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label">الدور <span class="req">*</span></label>
            <select class="form-select" id="f-role">
              <option value="">— اختر —</option>
              <option value="REG_CHIEF">رئيس التسجيل</option>
              <option value="INSP_CHIEF">رئيس الفحص</option>
              <option value="PLATE_DEPT">قسم اللوحات</option>
              <option value="OFFICER">ضابط ميداني</option>
              <option value="CITIZEN">مواطن</option>
              <option value="ADMIN">مدير النظام</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">كلمة المرور <span class="req">*</span></label>
            <input class="form-input" id="f-pass" type="password" placeholder="6 أحرف على الأقل">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeAdd()">إلغاء</button>
        <button class="btn btn-primary" onclick="saveUser()">حفظ المستخدم</button>
      </div>
    </div>
  </div>

<script>
const T = localStorage.getItem('auth_token');
const ROLE_LABEL = {
  ADMIN:'مدير النظام', REG_CHIEF:'رئيس التسجيل', INSP_CHIEF:'رئيس الفحص',
  PLATE_DEPT:'قسم اللوحات', OFFICER:'ضابط ميداني', CITIZEN:'مواطن'
};
let page = 1, timer;
const LIM = 15;

async function load() {
  const q    = document.getElementById('q').value;
  const role = document.getElementById('role-filter').value;
  const res  = await fetch(`/api/v1/admin/users?page=${page}&limit=${LIM}&q=${encodeURIComponent(q)}&role=${role}`,
    { headers: { Authorization: 'Bearer ' + T } });
  const data = await res.json();

  if (!data.success) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="8"><div class="empty"><p style="color:var(--danger)">خطأ: ${data.message}</p></div></td></tr>`;
    return;
  }

  const { users, total } = data.data;
  document.getElementById('pg-info').textContent = `إجمالي: ${total} مستخدم`;
  document.getElementById('pg-prev').disabled = page === 1;
  document.getElementById('pg-next').disabled = page * LIM >= total;

  if (!users.length) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="8"><div class="empty"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><p>لا يوجد مستخدمون</p></div></td></tr>`;
    return;
  }

  document.getElementById('tbody').innerHTML = users.map((u, i) => `
    <tr>
      <td class="text-muted">${(page-1)*LIM + i + 1}</td>
      <td>
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--navy-3),var(--blue));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;">${u.full_name[0]||'?'}</div>
          <div>
            <div style="font-weight:600;font-size:13px;">${u.full_name}</div>
            <div class="text-muted">${u.username||u.national_id}</div>
          </div>
        </div>
      </td>
      <td class="font-mono">${u.national_id}</td>
      <td><span class="rbadge rbadge-${u.role}">${ROLE_LABEL[u.role]||u.role}</span></td>
      <td class="text-muted">${u.phone||'—'}</td>
      <td class="text-muted" style="font-size:12px;">${u.last_login?u.last_login.replace('T',' ').split('.')[0]:'—'}</td>
      <td>
        <span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:${u.is_active?'var(--success)':'var(--text-4)'}">
          <span class="dot ${u.is_active?'dot-green':'dot-gray'}"></span>
          ${u.is_active?'نشط':'معطّل'}
        </span>
      </td>
      <td>
        <button class="btn btn-ghost btn-sm" onclick="toggle(${u.id},'${u.full_name}',${u.is_active})">
          ${u.is_active?'تعطيل':'تفعيل'}
        </button>
      </td>
    </tr>
  `).join('');
}

async function toggle(id, name, active) {
  if (!confirm(`هل تريد ${active?'تعطيل':'تفعيل'} حساب "${name}"؟`)) return;
  await fetch(`/api/v1/admin/users/${id}/toggle`, { method:'POST', headers:{Authorization:'Bearer '+T} });
  load();
}

function openAdd()  { document.getElementById('add-modal').style.display='flex'; }
function closeAdd() { document.getElementById('add-modal').style.display='none'; document.getElementById('modal-err').style.display='none'; }

async function saveUser() {
  const body = {
    full_name:   document.getElementById('f-name').value.trim(),
    national_id: document.getElementById('f-nid').value.trim(),
    phone:       document.getElementById('f-phone').value.trim(),
    role:        document.getElementById('f-role').value,
    password:    document.getElementById('f-pass').value,
  };
  const err = document.getElementById('modal-err');
  err.style.display = 'none';
  if (!body.full_name || !body.national_id || !body.role || !body.password)
    return showErr('يرجى ملء جميع الحقول المطلوبة');
  const res = await fetch('/api/v1/admin/users',{
    method:'POST',
    headers:{Authorization:'Bearer '+T,'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (data.success) { closeAdd(); load(); }
  else showErr(data.message||'خطأ في الحفظ');
}

function showErr(msg) {
  const el = document.getElementById('modal-err');
  el.textContent = msg;
  el.style.display = 'flex';
}

function pg(d) { page = Math.max(1, page + d); load(); }

document.getElementById('q').addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(() => { page=1; load(); }, 400); });
document.getElementById('role-filter').addEventListener('change', () => { page=1; load(); });

load();
</script>
</body>
</html>
