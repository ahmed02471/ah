<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنواع المخالفات — نظام مرور سبها</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body class="with-sidebar">
    
    
    
    

    <div id="sidebar-container"></div>
  <script src="/js/sidebar.js"></script>
  <div class="main-content">
        <div class="page-wrapper">
            <div class="page-header">
                <div class="page-header-left">
                    <h1 class="page-title">أنواع المخالفات</h1>
                    <p class="page-subtitle">إدارة أنواع المخالفات المرورية وفق قانون المرور الليبي رقم 11/1984</p>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
                    جدول أنواع المخالفات
                </div>
                <div class="table-container">
                    <table class="table">
                        <thead><tr>
                            <th>الكود</th>
                            <th>نوع المخالفة</th>
                            <th>المرجع القانوني</th>
                            <th>مبلغ الغرامة (د.ل)</th>
                            <th>تحويل للنيابة</th>
                        </tr></thead>
                        <tbody id="types-tbody">
                            <tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text-3);">جارٍ التحميل...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadTypes() {
            const tbody = document.getElementById('types-tbody');
            try {
                const token = localStorage.getItem('auth_token');
                const res = await fetch('/api/v1/admin/violation-types', { headers: { 'Authorization': 'Bearer ' + token } });
                const data = await res.json();
                if (!data.success) throw new Error();
                const types = data.data;
                if (!types.length) { tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><span class="empty-state-title">لا توجد أنواع مخالفات</span></div></td></tr>`; return; }
                tbody.innerHTML = types.map(t => `<tr>
                    <td class="font-mono">${t.code}</td>
                    <td style="font-weight:600;">${t.name_ar}</td>
                    <td style="color:var(--text-2);">${t.legal_reference || '—'}</td>
                    <td style="font-weight:700;color:var(--danger);">${Number(t.fine_amount).toFixed(1)}</td>
                    <td><span class="badge ${t.requires_prosecutor ? 'badge-red' : 'badge-gray'}">${t.requires_prosecutor ? 'نعم' : 'لا'}</span></td>
                </tr>`).join('');
            } catch { tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--danger);padding:32px;">خطأ في تحميل البيانات</td></tr>`; }
        }
        loadTypes();
    </script>
</body>
</html>
