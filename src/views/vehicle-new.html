<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل مركبة جديدة — نظام مرور سبها</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body class="with-sidebar">
    
    
    
    

    <div id="sidebar-container"></div>
  <script src="/js/sidebar.js"></script>
  <div class="main-content">
        <div class="page-wrapper">

            <div class="page-header">
                <div class="page-header-left">
                    <h1 class="page-title">تسجيل مركبة جديدة</h1>
                    <p class="page-subtitle">أدخل بيانات المركبة والمالك لإتمام التسجيل</p>
                </div>
                <div class="page-actions">
                    <a href="/vehicles" class="btn btn-secondary">
                        <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                        العودة للقائمة
                    </a>
                </div>
            </div>

            <div class="alert alert-error" id="form-error" style="display:none;">
                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span id="error-msg">حدث خطأ</span>
            </div>

            <form id="vehicleForm">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">

                    <!-- بيانات المركبة -->
                    <div class="card">
                        <div class="card-header">
                            <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v9a2 2 0 0 1-2 2h-3"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
                            بيانات المركبة
                        </div>
                        <div class="card-body">
                            <div class="form-group">
                                <label class="form-label">رقم اللوحة <span style="color:var(--danger)">*</span></label>
                                <input class="form-input" type="text" name="plate_number" id="plate_number" placeholder="مثال: 1234-أ-ليبيا" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">رقم الشاصي <span style="color:var(--danger)">*</span></label>
                                <input class="form-input" type="text" name="chassis_number" placeholder="أدخل رقم الشاصي" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">نوع المركبة <span style="color:var(--danger)">*</span></label>
                                <select class="form-select" name="vehicle_type" required>
                                    <option value="">اختر النوع</option>
                                    <option>سيارة</option><option>شاحنة</option>
                                    <option>دراجة</option><option>حافلة</option><option>جرار</option>
                                </select>
                            </div>
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                                <div class="form-group">
                                    <label class="form-label">الصانع <span style="color:var(--danger)">*</span></label>
                                    <input class="form-input" type="text" name="make" placeholder="تويوتا" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">الطراز <span style="color:var(--danger)">*</span></label>
                                    <input class="form-input" type="text" name="model" placeholder="كامري" required>
                                </div>
                            </div>
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                                <div class="form-group">
                                    <label class="form-label">سنة الصنع <span style="color:var(--danger)">*</span></label>
                                    <input class="form-input" type="number" name="year" min="1970" max="2030" placeholder="2022" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">اللون</label>
                                    <input class="form-input" type="text" name="color" placeholder="أبيض">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">رقم المحرك</label>
                                <input class="form-input" type="text" name="engine_number" placeholder="رقم المحرك">
                            </div>
                        </div>
                    </div>

                    <!-- بيانات المالك والتأمين -->
                    <div style="display:flex;flex-direction:column;gap:20px;">
                        <div class="card">
                            <div class="card-header">
                                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                بيانات المالك
                            </div>
                            <div class="card-body">
                                <div class="form-group">
                                    <label class="form-label">الرقم الوطني للمالك <span style="color:var(--danger)">*</span></label>
                                    <input class="form-input" type="text" name="owner_national_id" placeholder="12 رقماً" maxlength="12" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">اسم المالك الكامل <span style="color:var(--danger)">*</span></label>
                                    <input class="form-input" type="text" name="owner_name" placeholder="الاسم الكامل" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">رقم الهاتف</label>
                                    <input class="form-input" type="tel" name="owner_phone" placeholder="09XXXXXXXX">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">العنوان</label>
                                    <input class="form-input" type="text" name="owner_address" placeholder="المدينة / الحي">
                                </div>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-header">
                                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                                بيانات التأمين
                            </div>
                            <div class="card-body">
                                <div class="form-group">
                                    <label class="form-label">شركة التأمين</label>
                                    <input class="form-input" type="text" name="insurance_company" placeholder="اسم شركة التأمين">
                                </div>
                                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                                    <div class="form-group">
                                        <label class="form-label">رقم الوثيقة</label>
                                        <input class="form-input" type="text" name="insurance_policy_number" placeholder="رقم الوثيقة">
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">تاريخ انتهاء التأمين</label>
                                        <input class="form-input" type="date" name="insurance_expiry">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div style="display:flex;justify-content:flex-end;gap:12px;margin-top:20px;">
                    <a href="/vehicles" class="btn btn-secondary">إلغاء</a>
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        <span id="submitText">تسجيل المركبة</span>
                    </button>
                </div>
            </form>

        </div>
    </div>

    <script>
        document.getElementById('vehicleForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('form-error');
            const errorMsg = document.getElementById('error-msg');
            btn.disabled = true;
            document.getElementById('submitText').textContent = 'جارٍ الحفظ...';
            errorDiv.style.display = 'none';

            const form = new FormData(this);
            const body = Object.fromEntries(form.entries());

            try {
                const token = localStorage.getItem('auth_token');
                const res = await fetch('/api/v1/vehicles', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/vehicles/' + data.data.id;
                } else {
                    errorMsg.textContent = data.message || 'فشل حفظ البيانات';
                    errorDiv.style.display = 'flex';
                }
            } catch (err) {
                errorMsg.textContent = 'خطأ في الاتصال بالخادم';
                errorDiv.style.display = 'flex';
            } finally {
                btn.disabled = false;
                document.getElementById('submitText').textContent = 'تسجيل المركبة';
            }
        });
    </script>
</body>
</html>
