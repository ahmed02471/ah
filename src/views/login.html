<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول — نظام مرور سبها</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body.login-page {
      background:
        linear-gradient(rgba(10,22,40,.65), rgba(10,22,40,.65)),
        url('/img/castle.jpg') center/cover no-repeat fixed;
    }
    body.login-page::before,
    body.login-page::after { display: none; }
  </style>
</head>
<body class="login-page" style="overflow-x:hidden;">
  <div class="login-card">

    <div class="login-emblem">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <path d="M9 12l2 2 4-4" stroke-width="2"/>
      </svg>
    </div>

    <h1 class="login-title">نظام إدارة مرور سبها</h1>
    <p class="login-subtitle">Sabha Traffic Management System</p>

    <div class="login-divider"></div>

    <div id="err-box" class="alert alert-error" style="display:none;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="err-msg"></span>
    </div>

    <div class="form-group">
      <label class="form-label">اسم المستخدم</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </span>
        <input class="form-input" id="username" type="text"
          placeholder="أدخل اسم المستخدم" autocomplete="username">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">كلمة المرور</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input class="form-input" id="password" type="password"
          placeholder="••••••••" autocomplete="current-password"
          style="padding-left:38px;">
        <button class="input-btn" type="button" id="toggle-pw" title="إظهار/إخفاء">
          <svg width="18" height="18" id="eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button class="btn btn-primary btn-block btn-lg" id="login-btn" onclick="doLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      <span id="btn-text">دخول</span>
    </button>

    <div class="login-footer">
      <strong>قسم مرور سبها — ليبيا</strong><br>
      جميع الحقوق محفوظة © 2026
  </div>

<script>
document.getElementById('toggle-pw').onclick = function() {
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
};

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('login-btn');
  const errBox   = document.getElementById('err-box');
  const errMsg   = document.getElementById('err-msg');
  const btnText  = document.getElementById('btn-text');

  errBox.style.display = 'none';
  if (!username || !password) {
    errMsg.textContent = 'يرجى إدخال اسم المستخدم وكلمة المرور';
    errBox.style.display = 'flex'; return;
  }

  btn.disabled = true;
  btnText.textContent = 'جارٍ التحقق...';

  try {
    const res  = await fetch('/api/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (data.success) {
      localStorage.setItem('auth_token', data.data.token);
      localStorage.setItem('user_role',  data.data.role);
      localStorage.setItem('user_name',  data.data.full_name);
      localStorage.setItem('user_id',    data.data.id);
      const role = data.data.role;
          const mustChange = data.data.must_change_password;
          if (mustChange) { window.location.href = "/change-password"; }
          else if (role === "CITIZEN") { window.location.href = "/citizen"; }
          else { window.location.href = "/dashboard"; }
    } else {
      errMsg.textContent = data.message || 'بيانات غير صحيحة';
      errBox.style.display = 'flex';
      btn.disabled = false;
      btnText.textContent = 'دخول';
    }
  } catch (e) {
    errMsg.textContent = 'تعذّر الاتصال بالخادم — تأكد أن الخادم يعمل';
    errBox.style.display = 'flex';
    btn.disabled = false;
    btnText.textContent = 'دخول';
  }
}
</script>
</body>
</html>
