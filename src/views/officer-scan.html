<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>مسح QR — نظام مرور سبها</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Cairo',sans-serif; background:#0a1628; color:#fff; direction:rtl; min-height:100vh; }

    /* ─── Header ─── */
    .hdr {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 16px;
      background:rgba(255,255,255,.05);
      border-bottom:1px solid rgba(255,255,255,.08);
      position:sticky; top:0; z-index:10;
    }
    .hdr-title { font-size:16px; font-weight:700; }
    .hdr-badge { display:flex; align-items:center; gap:6px; font-size:12px; color:rgba(255,255,255,.5); }
    .live-dot { width:8px; height:8px; border-radius:50%; background:#6ee7b7; animation:blink 1.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ─── Camera ─── */
    .cam-wrap {
      position:relative; margin:16px;
      border-radius:16px; overflow:hidden;
      background:#000; aspect-ratio:1;
      border:2px solid rgba(29,78,216,.6);
      box-shadow:0 0 40px rgba(29,78,216,.3);
    }
    #qr-video { width:100%; height:100%; object-fit:cover; display:block; }

    .cam-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
    .scan-frame {
      width:60%; aspect-ratio:1;
      border:2px solid #fff; border-radius:12px;
      box-shadow:0 0 0 9999px rgba(0,0,0,.4);
      position:relative;
    }
    /* أركان الإطار */
    .scan-frame::before, .scan-frame::after,
    .scan-frame span::before, .scan-frame span::after {
      content:''; position:absolute; width:20px; height:20px;
      border-color:#3b82f6; border-style:solid;
    }
    .scan-frame::before  { top:-2px; right:-2px; border-width:3px 3px 0 0; border-radius:0 6px 0 0; }
    .scan-frame::after   { bottom:-2px; right:-2px; border-width:0 3px 3px 0; border-radius:0 0 6px 0; }
    .scan-frame span::before { top:-2px; left:-2px; border-width:3px 0 0 3px; border-radius:6px 0 0 0; }
    .scan-frame span::after  { bottom:-2px; left:-2px; border-width:0 0 3px 3px; border-radius:0 0 0 6px; }

    .scan-line {
      position:absolute; left:0; right:0; height:2px;
      background:linear-gradient(90deg,transparent,#3b82f6,transparent);
      animation:scan 2s ease-in-out infinite;
    }
    @keyframes scan { 0%{top:0} 50%{top:calc(100% - 2px)} 100%{top:0} }

    .cam-placeholder {
      position:absolute; inset:0;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:12px; background:rgba(0,0,0,.6);
    }
    .cam-placeholder svg { opacity:.4; width:56px; height:56px; }
    .cam-placeholder p { font-size:13px; color:rgba(255,255,255,.5); }

    /* ─── Buttons ─── */
    .btns { display:flex; gap:10px; margin:0 16px 12px; }
    .btn-scan {
      flex:1; padding:13px; border-radius:12px; border:none; cursor:pointer;
      font-family:'Cairo',sans-serif; font-size:14px; font-weight:700;
      display:flex; align-items:center; justify-content:center; gap:8px;
      transition:all .2s;
    }
    .btn-scan.primary { background:#1d4ed8; color:#fff; box-shadow:0 4px 16px rgba(29,78,216,.4); }
    .btn-scan.primary:hover { background:#1e40af; }
    .btn-scan.stop { background:rgba(239,68,68,.15); color:#fca5a5; border:1px solid rgba(239,68,68,.3); flex:0; padding:13px 16px; }
    .btn-scan svg { width:18px; height:18px; }

    /* ─── Manual Input ─── */
    .manual {
      margin:0 16px 16px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.1);
      border-radius:12px; padding:14px;
    }
    .manual label { font-size:12px; color:rgba(255,255,255,.5); margin-bottom:6px; display:block; }
    .manual-row { display:flex; gap:8px; }
    .manual input {
      flex:1; padding:9px 12px; border-radius:8px;
      border:1px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.07); color:#fff;
      font-family:'Cairo',sans-serif; font-size:13px;
    }
    .manual input::placeholder { color:rgba(255,255,255,.3); }
    .manual button {
      padding:9px 16px; border-radius:8px; border:none;
      background:rgba(255,255,255,.1); color:#fff; cursor:pointer;
      font-family:'Cairo',sans-serif; font-size:13px; font-weight:600;
    }

    /* ─── Result Card ─── */
    .result { margin:0 16px 16px; border-radius:14px; overflow:hidden; }

    .result-head {
      padding:14px 16px;
      display:flex; align-items:center; gap:12px;
    }
    .result-head.clear  { background:linear-gradient(135deg,#065f46,#047857); }
    .result-head.alert  { background:linear-gradient(135deg,#991b1b,#b91c1c); }
    .result-head.warn   { background:linear-gradient(135deg,#92400e,#b45309); }

    .result-head-icon { font-size:28px; }
    .result-head-text h3 { font-size:15px; font-weight:700; }
    .result-head-text p  { font-size:12px; opacity:.8; margin-top:2px; }

    /* صورة المالك في الرأس */
    .owner-photo {
      width:52px; height:52px; border-radius:50%;
      object-fit:cover; border:3px solid rgba(255,255,255,.3);
      flex-shrink:0;
    }
    .owner-initial {
      width:52px; height:52px; border-radius:50%;
      background:linear-gradient(135deg,#1d4ed8,#7c3aed);
      display:flex; align-items:center; justify-content:center;
      font-size:20px; font-weight:700; color:#fff; flex-shrink:0;
      border:3px solid rgba(255,255,255,.2);
    }

    .result-body { background:rgba(255,255,255,.07); }

    /* التحذيرات */
    .alert-item {
      display:flex; align-items:flex-start; gap:8px;
      padding:10px 14px; font-size:13px; font-weight:500;
      border-bottom:1px solid rgba(255,255,255,.05);
    }
    .alert-item.danger  { color:#fca5a5; }
    .alert-item.warning { color:#fcd34d; }

    /* بيانات المركبة */
    .data-grid {
      display:grid; grid-template-columns:1fr 1fr;
      gap:0;
    }
    .data-item {
      padding:10px 14px;
      border-bottom:1px solid rgba(255,255,255,.05);
    }
    .data-item:nth-child(odd) { border-left:1px solid rgba(255,255,255,.05); }
    .data-label { font-size:10px; color:rgba(255,255,255,.4); text-transform:uppercase; letter-spacing:.5px; margin-bottom:2px; }
    .data-val   { font-size:13px; font-weight:600; }

    /* زر تحرير مخالفة */
    .viol-btn {
      width:100%; padding:14px; background:#b91c1c; color:#fff;
      border:none; border-radius:0 0 12px 12px; cursor:pointer;
      font-family:'Cairo',sans-serif; font-size:14px; font-weight:700;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .viol-btn:hover { background:#991b1b; }
    .viol-btn svg { width:18px; height:18px; }

    /* نموذج المخالفة */
    .vf {
      margin-top:12px; border-radius:14px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.1);
      overflow:hidden;
    }
    .vf-head { padding:12px 14px; background:rgba(239,68,68,.15); font-size:14px; font-weight:700; color:#fca5a5; }
    .vf-body { padding:14px; }
    .vf label { display:block; font-size:12px; color:rgba(255,255,255,.5); margin-bottom:5px; }
    .vf select, .vf textarea {
      width:100%; padding:9px 12px; border-radius:8px;
      border:1px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.07); color:#fff;
      font-family:'Cairo',sans-serif; font-size:13px; margin-bottom:12px;
    }
    .vf textarea { resize:none; height:60px; }
    .vf-btns { display:flex; gap:8px; }
    .vf-submit { flex:1; padding:11px; background:#dc2626; color:#fff; border:none; border-radius:8px; cursor:pointer; font-family:'Cairo',sans-serif; font-size:13px; font-weight:700; }
    .vf-cancel { padding:11px 14px; background:rgba(255,255,255,.1); color:#fff; border:none; border-radius:8px; cursor:pointer; font-family:'Cairo',sans-serif; font-size:13px; }

    .reset-btn {
      width:100%; margin:0 0 16px; padding:11px;
      background:rgba(255,255,255,.07); color:rgba(255,255,255,.6);
      border:1px solid rgba(255,255,255,.1); border-radius:10px; cursor:pointer;
      font-family:'Cairo',sans-serif; font-size:13px;
      display:flex; align-items:center; justify-content:center; gap:6px;
    }

    .loading { text-align:center; padding:20px; color:rgba(255,255,255,.5); font-size:13px; }
    .err-box { margin:0 16px 12px; padding:12px 14px; background:rgba(239,68,68,.15); border:1px solid rgba(239,68,68,.3); border-radius:10px; color:#fca5a5; font-size:13px; }
  </style>
</head>
<body>

  <div class="hdr">
    <div style="display:flex;align-items:center;gap:10px;">
      <a href="/dashboard" style="color:rgba(255,255,255,.5);display:flex;padding:4px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <span class="hdr-title">مسح QR — مرور سبها</span>
    </div>
    <div class="hdr-badge">
      <span class="live-dot" id="status-dot"></span>
      <span id="status-txt">جاهز</span>
    </div>
  </div>

  <div class="cam-wrap" id="cam-wrap">
    <video id="qr-video" autoplay playsinline muted></video>
    <div class="cam-overlay"><div class="scan-frame"><span></span><div class="scan-line"></div></div></div>
    <div class="cam-placeholder" id="cam-ph">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3h-3z M17 17h3v3h-3z"/></svg>
      <p>اضغط "تشغيل الكاميرا"</p>
    </div>
  </div>

  <div class="btns">
    <button class="btn-scan primary" id="start-btn" onclick="startCam()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
      تشغيل الكاميرا
    </button>
    <button class="btn-scan stop" id="stop-btn" onclick="stopCam()" style="display:none;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
    </button>
  </div>

  <div class="manual">
    <label>إدخال يدوي — رقم اللوحة أو رمز QR</label>
    <div class="manual-row">
      <input id="manual-in" placeholder="مثال: 45892 - 1 - LBY" dir="ltr" onkeydown="if(event.key==='Enter')manualSearch()">
      <button onclick="manualSearch()">بحث</button>
    </div>
  </div>

  <div id="err-area"></div>
  <div id="result-area"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
<script>
const T    = localStorage.getItem('auth_token');
const role = localStorage.getItem('user_role');
const name = localStorage.getItem('user_name');
let stream, interval, current, vtypes=[], showingVF=false;

// ── الكاميرا ──────────────────────────────────────────────────────
async function startCam() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:720} }
    });
    const v = document.getElementById('qr-video');
    v.srcObject = stream;
    document.getElementById('cam-ph').style.display = 'none';
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('stop-btn').style.display = 'flex';
    setStatus('scanning','جارٍ المسح...');

    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
    interval = setInterval(() => {
      if (v.readyState !== v.HAVE_ENOUGH_DATA) return;
      canvas.width = v.videoWidth; canvas.height = v.videoHeight;
      ctx.drawImage(v,0,0);
      const img = ctx.getImageData(0,0,canvas.width,canvas.height);
      const code = jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
      if (code?.data) { stopCam(); handleQr(code.data); }
    }, 300);
  } catch(e) {
    showErr('لا يمكن الوصول للكاميرا: ' + e.message);
  }
}

function stopCam() {
  if (stream)   { stream.getTracks().forEach(t=>t.stop()); stream=null; }
  if (interval) { clearInterval(interval); interval=null; }
  document.getElementById('cam-ph').style.display = 'flex';
  document.getElementById('start-btn').style.display = 'flex';
  document.getElementById('stop-btn').style.display = 'none';
  setStatus('ready','جاهز');
}

function setStatus(s,t) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-txt');
  dot.style.background = s==='scanning' ? '#fcd34d' : s==='found' ? '#6ee7b7' : '#6ee7b7';
  txt.textContent = t;
}

// ── معالجة QR ────────────────────────────────────────────────────
function handleQr(raw) {
  const token = raw.includes('/') ? raw.split('/').pop() : raw;
  fetchByToken(token);
}

async function fetchByToken(token) {
  showLoading();
  try {
    const res  = await fetch(`/api/v1/vehicles/qr/${token}`, { headers:{Authorization:'Bearer '+T} });
    const data = await res.json();
    if (data.success) showResult(data.data);
    else showErr('رمز QR غير صالح أو المركبة غير مسجلة');
  } catch { showErr('خطأ في الاتصال بالخادم'); }
}

async function manualSearch() {
  const q = document.getElementById('manual-in').value.trim();
  if (!q) return;
  showLoading();
  try {
    // حاول كـ QR token أولاً
    if (q.length === 32 && !/\s/.test(q)) {
      fetchByToken(q); return;
    }
    // بحث برقم اللوحة
    const res  = await fetch(`/api/v1/vehicles?q=${encodeURIComponent(q)}&limit=1`, { headers:{Authorization:'Bearer '+T} });
    const data = await res.json();
    if (data.success && data.data.vehicles.length) {
      // جلب بيانات QR الكاملة
      const v = data.data.vehicles[0];
      fetchByToken(v.qr_token);
    } else showErr('لم يتم العثور على مركبة: ' + q);
  } catch { showErr('خطأ في الاتصال'); }
}

// ── عرض النتيجة ──────────────────────────────────────────────────
function showResult(v) {
  current = v;
  const today = new Date().toISOString().split('T')[0];
  const alerts = v.alerts || [];
  const canViol = (role==='OFFICER'||role==='ADMIN') && v.status !== 'suspended';

  setStatus('found','تم العثور على المركبة');

  let alertsHtml = alerts.map(a =>
    `<div class="alert-item ${a.level}"><span>${a.level==='danger'?'⛔':'⚠️'}</span><span>${a.msg}</span></div>`
  ).join('');

  const headClass = alerts.length === 0 ? 'clear' : alerts.some(a=>a.level==='danger') ? 'alert' : 'warn';
  const headIcon  = alerts.length === 0 ? '✅' : '🚨';
  const headTitle = alerts.length === 0 ? 'المركبة سليمة' : `${alerts.filter(a=>a.level==='danger').length} تحذير خطير`;
  const headSub   = v.plate_number;

  const photoHtml = v.owner_photo
    ? `<img src="${v.owner_photo}" class="owner-photo">`
    : `<div class="owner-initial">${(v.owner_name||'?')[0]}</div>`;

  document.getElementById('result-area').innerHTML = `
    <div class="result">
      <div class="result-head ${headClass}">
        ${photoHtml}
        <div class="result-head-text" style="flex:1;">
          <h3>${headTitle}</h3>
          <p>${headSub}</p>
        </div>
        <span style="font-size:26px;">${headIcon}</span>
      </div>

      <div class="result-body">
        ${alertsHtml ? `<div>${alertsHtml}</div>` : ''}

        <div class="data-grid">
          <div class="data-item"><div class="data-label">رقم اللوحة</div><div class="data-val font-mono" style="font-size:12px;">${v.plate_number}</div></div>
          <div class="data-item"><div class="data-label">نوع المركبة</div><div class="data-val">${v.vehicle_type||'—'}</div></div>
          <div class="data-item"><div class="data-label">المالك</div><div class="data-val">${v.owner_name||'—'}</div></div>
          <div class="data-item"><div class="data-label">رقم الهوية</div><div class="data-val font-mono" style="font-size:11px;">${v.owner_id_card||v.owner_national_id||'—'}</div></div>
          <div class="data-item"><div class="data-label">رخصة القيادة</div><div class="data-val">${v.driving_license||'—'}</div></div>
          <div class="data-item"><div class="data-label">الماركة</div><div class="data-val">${v.make||''} ${v.model||''} ${v.year||''}</div></div>
          <div class="data-item"><div class="data-label">اللون</div><div class="data-val">${v.color||'—'}</div></div>
          <div class="data-item"><div class="data-label">رقم الهيكل</div><div class="data-val font-mono" style="font-size:11px;">${v.chassis_number||'—'}</div></div>
          <div class="data-item"><div class="data-label">التأمين حتى</div><div class="data-val" style="color:${v.ins_expiry&&v.ins_expiry<today?'#fca5a5':'#6ee7b7'}">${v.ins_expiry||'—'}</div></div>
          <div class="data-item"><div class="data-label">الفحص حتى</div><div class="data-val" style="color:${v.insp_expiry&&v.insp_expiry<today?'#fca5a5':'#6ee7b7'}">${v.insp_expiry||'—'}</div></div>
          <div class="data-item"><div class="data-label">البل حتى</div><div class="data-val" style="color:${v.bel_expiry&&v.bel_expiry<today?'#fca5a5':'#6ee7b7'}">${v.bel_expiry||'—'}</div></div>
          <div class="data-item"><div class="data-label">الحالة</div><div class="data-val" style="color:${v.status==='active'?'#6ee7b7':v.status==='suspended'?'#fcd34d':'#fca5a5'}">${v.status==='active'?'نشطة':v.status==='suspended'?'معلّقة':'مُبلَّغ عنها'}</div></div>
        </div>

        ${canViol ? `<button class="viol-btn" onclick="toggleVF()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>تحرير مخالفة</button>` : ''}
      </div>
    </div>

    <div class="vf" id="vf-form" style="display:none;">
      <div class="vf-head">📋 تحرير مخالفة — ${v.plate_number}</div>
      <div class="vf-body">
        <label>نوع المخالفة *</label>
        <select id="vt-sel" onchange="updateFine()"><option value="">— اختر —</option></select>
        <label>قيمة الغرامة (د.ل)</label>
        <select id="fine-show" disabled style="background:rgba(255,255,255,.05);color:#fcd34d;font-weight:700;"><option>—</option></select>
        <label>الموقع</label>
        <textarea id="vf-loc" placeholder="مثال: شارع الجمهورية"></textarea>
        <div class="vf-btns">
          <button class="vf-submit" onclick="submitViol()">تسجيل المخالفة</button>
          <button class="vf-cancel" onclick="toggleVF()">إلغاء</button>
        </div>
      </div>
    </div>

    <button class="reset-btn" onclick="resetScan()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      مسح جديد
    </button>`;

  document.getElementById('err-area').innerHTML = '';
  loadViolationTypes();
}

function toggleVF() {
  const vf = document.getElementById('vf-form');
  showingVF = !showingVF;
  vf.style.display = showingVF ? 'block' : 'none';
  if (showingVF) vf.scrollIntoView({behavior:'smooth'});
}

async function loadViolationTypes() {
  if (vtypes.length) { populateVT(); return; }
  try {
    const res  = await fetch('/api/v1/admin/violation-types', { headers:{Authorization:'Bearer '+T} });
    const data = await res.json();
    if (data.success) { vtypes = data.data; populateVT(); }
  } catch(_) {}
}

function populateVT() {
  const sel = document.getElementById('vt-sel');
  if (!sel) return;
  vtypes.forEach(v => {
    const o = document.createElement('option');
    o.value = v.id; o.dataset.fine = v.fine_amount;
    o.textContent = `${v.name_ar} — ${v.fine_amount} د.ل`;
    sel.appendChild(o);
  });
}

function updateFine() {
  const sel = document.getElementById('vt-sel');
  const opt = sel.options[sel.selectedIndex];
  const fine = document.getElementById('fine-show');
  fine.innerHTML = `<option>${opt.dataset.fine ? opt.dataset.fine + ' دينار ليبي' : '—'}</option>`;
}

async function submitViol() {
  const vtId = document.getElementById('vt-sel').value;
  if (!vtId) { alert('يجب اختيار نوع المخالفة'); return; }
  const body = {
    vehicle_id:        current.id,
    violation_type_id: parseInt(vtId),
    location_note:     document.getElementById('vf-loc').value,
  };
  try {
    const res  = await fetch('/api/v1/violations', {
      method:'POST', headers:{'Authorization':'Bearer '+T,'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('vf-form').innerHTML = `<div style="padding:14px;background:rgba(6,95,70,.3);border-radius:14px;text-align:center;color:#6ee7b7;font-weight:700;">✅ تم تسجيل المخالفة — الغرامة: ${data.data.fine_amount} د.ل</div>`;
    } else alert(data.message);
  } catch { alert('خطأ في الاتصال'); }
}

function resetScan() {
  current = null; showingVF = false;
  document.getElementById('result-area').innerHTML = '';
  document.getElementById('err-area').innerHTML = '';
  document.getElementById('manual-in').value = '';
  setStatus('ready','جاهز');
}

function showLoading() {
  document.getElementById('result-area').innerHTML = `<div class="loading">جارٍ البحث...</div>`;
}

function showErr(msg) {
  document.getElementById('result-area').innerHTML = '';
  document.getElementById('err-area').innerHTML = `<div class="err-box">❌ ${msg}</div>`;
}

// تشغيل الكاميرا تلقائياً للضابط
window.addEventListener('load', () => {
  if (role === 'OFFICER') setTimeout(startCam, 600);
});
</script>
</body>
</html>
