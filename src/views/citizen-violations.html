<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>مخالفاتي — مرور سبها</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root{--primary:#2563EB;--primary-d:#1D4ED8;--primary-l:#EFF6FF;--success:#16A34A;--danger:#DC2626;--warning:#D97706;--bg:#F1F5F9;--surface:#FFFFFF;--border:#E2E8F0;--text:#0F172A;--text2:#475569;--text3:#94A3B8;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;padding-bottom:80px;}
    .hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(15,23,42,.05);}
    .back-btn{width:36px;height:36px;background:var(--bg);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--border);color:var(--text2);flex-shrink:0;}
    .hdr-title{font-size:16px;font-weight:800;color:var(--text);}
    .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;}
    .tab{flex:1;padding:13px;text-align:center;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;transition:all .2s;}
    .tab.active{color:var(--primary);border-bottom-color:var(--primary);}
    .section{padding:14px;}
    .viol-card{background:var(--surface);border-radius:14px;padding:14px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(15,23,42,.04);margin-bottom:10px;}
    .vc-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
    .vc-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;flex-shrink:0;}
    .vc-badge.unpaid{background:#FEF2F2;color:var(--danger);}
    .vc-badge.paid{background:#DCFCE7;color:var(--success);}
    .vc-type{font-size:14px;font-weight:700;flex:1;color:var(--text);}
    .vc-fine{font-size:18px;font-weight:900;margin-right:auto;}
    .vc-fine.unpaid{color:var(--danger);}
    .vc-fine.paid{color:var(--success);}
    .vc-meta{font-size:12px;color:var(--text3);display:flex;gap:12px;flex-wrap:wrap;}
    .empty{text-align:center;padding:44px 20px;color:var(--text3);}
    .empty svg{width:44px;height:44px;margin:0 auto 12px;opacity:.25;}
    .empty p{font-size:13px;}
    .bot-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;padding:8px 0 12px;box-shadow:0 -4px 16px rgba(15,23,42,.06);}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--text3);cursor:pointer;text-decoration:none;padding:4px 0;}
    .nav-item svg{width:22px;height:22px;}
    .nav-item.active{color:var(--primary);}
  </style>
</head>
<body>
  <div class="hdr">
    <button class="back-btn" onclick="location.href='/citizen/home'"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="hdr-title">مخالفاتي المرورية</span>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-all" onclick="setTab('all')">الكل</div>
    <div class="tab" id="tab-unpaid" onclick="setTab('unpaid')">غير مدفوعة</div>
    <div class="tab" id="tab-paid" onclick="setTab('paid')">مدفوعة</div>
  </div>

  <div class="section" id="list"><div style="text-align:center;padding:30px;color:#94a3b8;font-size:13px;">جارٍ التحميل...</div></div>

  <nav class="bot-nav">
    <a href="/citizen" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>الرئيسية</a>
    <a href="/citizen/vehicles" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v7a2 2 0 0 1-2 2h-1"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>مركباتي</a>
    <a href="/citizen/violations" class="nav-item active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="stroke:#1d4ed8;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>مخالفاتي</a>
    <a href="/citizen/reports" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>بلاغ</a>
    <a href="/citizen/notifications" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>إشعارات</a>
  </nav>

<script>
const T = localStorage.getItem('auth_token');
let currentTab = 'all', allViolations = [];

async function load() {
  const res  = await fetch('/api/v1/citizen/violations', { headers:{Authorization:'Bearer '+T} });
  const data = await res.json();
  if (data.success) { allViolations = data.data; render(); }
}

function setTab(tab) {
  currentTab = tab;
  ['all','unpaid','paid'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  render();
}

function render() {
  const list = currentTab === 'all' ? allViolations : allViolations.filter(v=>v.status===currentTab);
  if (!list.length) {
    document.getElementById('list').innerHTML = `<div class="empty"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg><p>لا توجد مخالفات</p></div>`;
    return;
  }
  document.getElementById('list').innerHTML = list.map(v => `
    <div class="viol-card">
      <div class="vc-top">
        <span class="vc-badge ${v.status}">${v.status==='unpaid'?'غير مدفوعة':'مدفوعة'}</span>
        <span class="vc-type">${v.type_name||'—'}</span>
        <span class="vc-fine ${v.status}">${v.fine_amount} د.ل</span>
      </div>
      <div class="vc-meta">
        <span>🚗 ${v.plate_number||'—'}</span>
        <span>📅 ${v.issued_at?.split('T')[0]||'—'}</span>
        ${v.location_note?`<span>📍 ${v.location_note}</span>`:''}
        ${v.paid_at?`<span>✅ سُدِّدت: ${v.paid_at.split('T')[0]}</span>`:''}
      </div>
      ${v.status==='unpaid'?`<div style="margin-top:10px;padding:8px 12px;background:#fef3c7;border-radius:8px;color:#92400e;font-size:12px;">💡 توجه لقسم المخالفات لتسديد الغرامة</div>`:''}
    </div>
  `).join('');
}

load();
</script>
</body>
</html>
