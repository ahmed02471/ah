<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الموظفون — نظام مرور سبها</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div id="sidebar-container"></div>
  <script src="/js/sidebar.js"></script>

  <div class="main-content">
    <div class="page-wrapper">

      <div class="page-header">
        <div>
          <div class="breadcrumb">
            <a href="/dashboard">الرئيسية</a><span class="breadcrumb-sep">›</span><span>الموظفون</span>
          </div>
          <h1 class="page-title">إدارة الموظفين</h1>
          <p class="page-subtitle">موظفو الأقسام وضباط الميدان</p>
        </div>
        <div class="page-actions">
          <a href="/admin/citizens" class="btn btn-secondary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            المواطنون
          </a>
          <button class="btn btn-primary" onclick="openAdd()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            إضافة موظف
          </button>
        </div>
      </div>

      <div class="card">
        <div class="search-bar">
          <div class="input-wrap search-input">
            <span class="input-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
            <input class="form-input" id="q" placeholder="بحث بالاسم أو اسم المستخدم أو الهاتف...">
          </div>
          <select class="form-select" id="role-filter" style="width:185px;">
            <option value="">كل الأدوار</option>
            <option value="ADMIN">مدير النظام</option>
            <option value="REG_CHIEF">رئيس التسجيل</option>
            <option value="INSP_CHIEF">رئيس الفحص</option>
            <option value="VIOLATIONS_DEPT">قسم المخالفات</option>
            <option value="PLATE_DEPT">قسم اللوحات</option>
            <option value="OFFICER">ضابط ميداني</option>
          </select>
        </div>

        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>#</th>
                <th>الموظف</th>
                <th>اسم المستخدم</th>
                <th>الدور</th>
                <th>الهاتف</th>
                <th>آخر دخول</th>
                <th>الحالة</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tbody">
              <tr><td colspan="8"><div class="empty"><p>جارٍ التحميل...</p></div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination">
          <span class="pg-info" id="pg-info">—</span>
          <div class="pg-btns">
            <button class="btn btn-secondary btn-sm" id="pg-prev" onclick="pg(-1)" disabled>السابق</button>
            <button class="btn btn-secondary btn-sm" id="pg-next" onclick="pg(1)">التالي</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal إضافة موظف -->
  <div id="modal" class="modal-backdrop" style="display:none;" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">إضافة موظف جديد</span>
        <button class="modal-close" onclick="closeModal()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="modal-body">
        <div id="modal-err" class="alert alert-error" style="display:none;"></div>
        <div class="form-group">
          <label class="form-label">الاسم الكامل <span class="req">*</span></label>
          <input class="form-input" id="f-name" placeholder="الاسم الثلاثي">
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label">الرقم الوطني <span class="req">*</span></label>
            <input class="form-input" id="f-nid" placeholder="12 رقم" maxlength="12" inputmode="numeric">
            <p class="form-hint">يبدأ بـ 1 ذكر أو 2 أنثى</p>
          </div>
          <div class="form-group">
            <label class="form-label">الدور <span class="req">*</span></label>
            <select class="form-select" id="f-role">
              <option value="">— اختر الدور —</option>
              <option value="REG_CHIEF">رئيس التسجيل</option>
              <option value="INSP_CHIEF">رئيس الفحص الفني</option>
              <option value="VIOLATIONS_DEPT">قسم المخالفات</option>
              <option value="PLATE_DEPT">قسم اللوحات</option>
              <option value="OFFICER">ضابط ميداني</option>
              <option value="ADMIN">مدير النظام</option>
            </select>
          </div>
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label">اسم المستخدم <span class="req">*</span></label>
            <input class="form-input" id="f-user" placeholder="مثال: ahmed.warfali" dir="ltr">
            <p class="form-hint">حروف وأرقام ونقطة فقط</p>
          </div>
          <div class="form-group">
            <label class="form-label">رقم الهاتف</label>
            <input class="form-input" id="f-phone" placeholder="09XXXXXXXX" inputmode="numeric">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">كلمة المرور <span class="req">*</span></label>
          <input class="form-input" id="f-pass" type="password" placeholder="6 أحرف على الأقل">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">إلغاء</button>
        <button class="btn btn-primary" onclick="save()">إضافة الموظف</button>
      </div>
    </div>
  </div>

<script>
const T = localStorage.getItem('auth_token');
const ROLE_LABEL = {
  ADMIN:'مدير النظام', REG_CHIEF:'رئيس التسجيل', INSP_CHIEF:'رئيس الفحص',
  VIOLATIONS_DEPT:'قسم المخالفات', PLATE_DEPT:'قسم اللوحات', OFFICER:'ضابط ميداني'
};
const ROLE_COLOR = {
  ADMIN:'badge-gold', REG_CHIEF:'badge-blue', INSP_CHIEF:'badge-success',
  VIOLATIONS_DEPT:'badge-danger', PLATE_DEPT:'badge-info', OFFICER:'badge-warning'
};
let page = 1, timer;
const LIM = 15;

async function load() {
  const q    = document.getElementById('q').value;
  const role = document.getElementById('role-filter').value;
  try {
    const res  = await fetch(`/api/v1/admin/staff?page=${page}&limit=${LIM}&q=${encodeURIComponent(q)}&role=${role}`,
      { headers: { Authorization: 'Bearer ' + T } });
    const data = await res.json();
    if (!data.success) { showErr(data.message); return; }
    const { users, total } = data.data;
    document.getElementById('pg-info').textContent = `إجمالي: ${total} موظف`;
    document.getElementById('pg-prev').disabled = page === 1;
    document.getElementById('pg-next').disabled = page * LIM >= total;

    if (!users.length) {
      document.getElementById('tbody').innerHTML =
        `<tr><td colspan="8"><div class="empty"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><p>لا يوجد موظفون</p></div></td></tr>`;
      return;
    }

    document.getElementById('tbody').innerHTML = users.map((u, i) => `
      <tr>
        <td class="text-muted" style="font-size:12px;">${(page-1)*LIM + i + 1}</td>
        <td>
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--navy),var(--blue));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;">${u.full_name[0]}</div>
            <div>
              <div style="font-weight:600;font-size:13px;">${u.full_name}</div>
              <div class="text-muted">${u.gender || ''}</div>
            </div>
          </div>
        </td>
        <td class="font-mono" style="font-size:12px;">${u.username}</td>
        <td><span class="badge ${ROLE_COLOR[u.role]||'badge-gray'}">${ROLE_LABEL[u.role]||u.role}</span></td>
        <td class="text-muted">${u.phone||'—'}</td>
        <td class="text-muted" style="font-size:12px;">${u.last_login?u.last_login.split('T')[0]:'لم يسجل بعد'}</td>
        <td>
          <div style="display:flex;align-items:center;gap:6px;">
            <span class="dot ${u.is_active?'dot-green':'dot-red'}"></span>
            <span style="font-size:12px;">${u.is_active?'نشط':'معطّل'}</span>
          </div>
        </td>
        <td>
          <button class="btn btn-ghost btn-sm" onclick="toggle(${u.id},'${u.full_name}',${u.is_active})">
            ${u.is_active?'تعطيل':'تفعيل'}
          </button>
        </td>
      </tr>
    `).join('');
  } catch (e) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="8" style="text-align:center;color:var(--danger);padding:30px;">خطأ في الاتصال بالخادم</td></tr>`;
  }
}

async function toggle(id, name, active) {
  if (!confirm(`هل تريد ${active?'تعطيل':'تفعيل'} حساب "${name}"؟`)) return;
  const res = await fetch(`/api/v1/admin/users/${id}/toggle`,
    { method:'POST', headers:{Authorization:'Bearer '+T} });
  const data = await res.json();
  if (data.success) load();
  else alert(data.message);
}

function openAdd()   { document.getElementById('modal').style.display='flex'; }
function closeModal(){ document.getElementById('modal').style.display='none'; document.getElementById('modal-err').style.display='none'; }

async function save() {
  const body = {
    national_id: document.getElementById('f-nid').value.trim(),
    username:    document.getElementById('f-user').value.trim(),
    full_name:   document.getElementById('f-name').value.trim(),
    role:        document.getElementById('f-role').value,
    phone:       document.getElementById('f-phone').value.trim(),
    password:    document.getElementById('f-pass').value,
  };
  if (!body.national_id||!body.username||!body.full_name||!body.role||!body.password)
    return showModalErr('يرجى ملء جميع الحقول المطلوبة');

  const res  = await fetch('/api/v1/admin/staff', {
    method:'POST', headers:{'Authorization':'Bearer '+T,'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (data.success) { closeModal(); load(); }
  else showModalErr(data.message);
}

function showModalErr(msg) {
  const el = document.getElementById('modal-err');
  el.textContent = msg; el.style.display = 'flex';
}

function showErr(msg) {
  document.getElementById('tbody').innerHTML =
    `<tr><td colspan="8" style="text-align:center;color:var(--danger);padding:30px;">${msg}</td></tr>`;
}

function pg(d) { page = Math.max(1, page + d); load(); }
document.getElementById('q').addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(() => { page=1; load(); }, 400); });
document.getElementById('role-filter').addEventListener('change', () => { page=1; load(); });
load();
</script>
</body>
</html>
