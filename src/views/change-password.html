<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تغيير كلمة المرور — نظام مرور سبها</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-emblem">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1 class="login-title">تغيير كلمة المرور</h1>
    <p class="login-subtitle">يجب تغيير كلمة المرور المؤقتة قبل المتابعة</p>
    <div class="login-divider"></div>

    <div id="err" class="alert alert-error" style="display:none;"></div>

    <div class="form-group">
      <label class="form-label">كلمة المرور الجديدة</label>
      <input class="form-input" id="pw1" type="password" placeholder="6 أحرف على الأقل">
    </div>
    <div class="form-group">
      <label class="form-label">تأكيد كلمة المرور</label>
      <input class="form-input" id="pw2" type="password" placeholder="أعد كتابة كلمة المرور">
    </div>
    <button class="btn btn-primary btn-block btn-lg" onclick="save()">حفظ كلمة المرور</button>
  </div>
<script>
const T = localStorage.getItem('auth_token');
async function save() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const err = document.getElementById('err');
  err.style.display = 'none';
  if (pw1.length < 6) { err.textContent = 'كلمة المرور يجب أن تكون 6 أحرف على الأقل'; err.style.display='flex'; return; }
  if (pw1 !== pw2)   { err.textContent = 'كلمتا المرور غير متطابقتين'; err.style.display='flex'; return; }
  const res  = await fetch('/api/v1/auth/change-password', {
    method:'POST', headers:{'Authorization':'Bearer '+T,'Content-Type':'application/json'},
    body: JSON.stringify({ new_password: pw1 })
  });
  const data = await res.json();
  if (data.success) location.href = '/citizen';
  else { err.textContent = data.message; err.style.display='flex'; }
}
</script>
</body>
</html>
