<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المركبات المسجلة — نظام مرور سبها</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body class="with-sidebar">
    
    
    
    

    <div id="sidebar-container"></div>
  <script src="/js/sidebar.js"></script>
  <div class="main-content">
        <div class="page-wrapper">

            <!-- Page Header -->
            <div class="page-header">
                <div class="page-header-left">
                    <h1 class="page-title">المركبات المسجلة</h1>
                    <p class="page-subtitle">البحث وإدارة جميع المركبات في قاعدة البيانات</p>
                </div>
                <div class="page-actions">
                    <a href="/vehicles/new" class="btn btn-primary">
                        <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        تسجيل مركبة جديدة
                    </a>
                </div>
            </div>

            <!-- Search & Filter Card -->
            <div class="card" style="margin-bottom:20px;">
                <div class="card-body" style="padding:16px 20px;">
                    <div class="search-bar">
                        <div class="search-input-wrap" style="flex:1;max-width:480px;position:relative;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;pointer-events:none;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            <input class="form-input" type="search" id="search-input" style="padding-right:38px;"
                                placeholder="ابحث برقم اللوحة، رقم الشاصي، أو اسم المالك...">
                        </div>
                        <select class="form-select" id="filter-status" style="max-width:180px;">
                            <option value="">كل الحالات</option>
                            <option value="active">نشطة</option>
                            <option value="suspended">معلقة</option>
                            <option value="transferred">منقولة</option>
                            <option value="reported_stolen">مسروقة</option>
                            <option value="reported_lost_plate">ضائعة اللوحة</option>
                        </select>
                        <select class="form-select" id="filter-type" style="max-width:160px;">
                            <option value="">كل الأنواع</option>
                            <option value="سيارة">سيارة</option>
                            <option value="شاحنة">شاحنة</option>
                            <option value="دراجة">دراجة</option>
                            <option value="حافلة">حافلة</option>
                            <option value="جرار">جرار</option>
                        </select>
                        <button class="btn btn-secondary" onclick="resetFilters()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
                            إعادة تعيين
                        </button>
                    </div>
                </div>
            </div>

            <!-- Results Table Card -->
            <div class="card">
                <div class="card-header" style="justify-content:space-between;">
                    <div style="display:flex;align-items:center;gap:10px;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v9a2 2 0 0 1-2 2h-3"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
                        نتائج البحث
                    </div>
                    <span id="results-count" style="font-size:.85rem;font-weight:400;color:var(--text-3);">...</span>
                </div>

                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>رقم اللوحة</th>
                                <th>المالك الحالي</th>
                                <th>نوع المركبة</th>
                                <th>الصانع / الطراز</th>
                                <th>السنة</th>
                                <th>الحالة</th>
                                <th>المخالفات</th>
                                <th>إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="vehicles-tbody">
                            <tr>
                                <td colspan="8" style="text-align:center;padding:48px;color:var(--text-3);">
                                    جارٍ التحميل...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="pagination-bar">
                    <button class="btn btn-secondary btn-sm" id="prev-page" onclick="changePage(-1)" disabled>
                        <svg width="14" height="14" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><polyline points="9 18 15 12 9 6"/></svg>
                        السابق
                    </button>
                    <span id="page-info" style="font-size:.875rem;color:var(--text-2);">صفحة 1</span>
                    <button class="btn btn-secondary btn-sm" id="next-page" onclick="changePage(1)">
                        التالي
                        <svg width="14" height="14" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        let currentPage = 1;
        const pageSize = 20;

        const statusMap = {
            active:          { text: 'نشطة',    cls: 'badge-green' },
            suspended:       { text: 'معلقة',   cls: 'badge-yellow' },
            transferred:     { text: 'منقولة',  cls: 'badge-gray' },
            reported_stolen: { text: 'مسروقة',  cls: 'badge-red' },
            reported_lost_plate: { text: 'ضائعة اللوحة', cls: 'badge-red' }
        };

        async function loadVehicles() {
            const q    = document.getElementById('search-input').value.trim();
            const st   = document.getElementById('filter-status').value;
            const type = document.getElementById('filter-type').value;

            const params = new URLSearchParams({
                page: currentPage, limit: pageSize,
                ...(q    && { q }),
                ...(st   && { status: st }),
                ...(type && { vehicle_type: type })
            });

            const tbody = document.getElementById('vehicles-tbody');
            tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:48px;color:var(--text-3);">جارٍ التحميل...</td></tr>`;

            try {
                const token = localStorage.getItem('auth_token');
                const res  = await fetch('/api/v1/vehicles?' + params, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.message);

                const { vehicles, total } = data.data;

                document.getElementById('results-count').textContent = `${total} مركبة`;
                document.getElementById('page-info').textContent =
                    `صفحة ${currentPage} من ${Math.max(1, Math.ceil(total / pageSize))}`;
                document.getElementById('prev-page').disabled = currentPage === 1;
                document.getElementById('next-page').disabled = currentPage * pageSize >= total;

                if (!vehicles.length) {
                    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:60px 20px;"><svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" style="width:56px;height:56px;display:block;margin:0 auto 12px;opacity:.4;"><circle cx=\"11\" cy=\"11\" r=\"8\"/><line x1=\"21\" y1=\"21\" x2=\"16.65\" y2=\"16.65\"/></svg><div style="font-size:16px;font-weight:600;color:#64748b;margin-bottom:6px;">لا توجد نتائج</div><div style="font-size:13px;color:#94a3b8;">جرّب تغيير معايير البحث</div></td></tr>`;
                    return;
                }

                tbody.innerHTML = vehicles.map(v => {
                    const st  = statusMap[v.status] || { text: v.status, cls: 'badge-gray' };
                    const vBadge = v.unpaid_violations > 0
                        ? `<span class="badge badge-red">${v.unpaid_violations} غير مدفوعة</span>`
                        : `<span class="badge badge-green">نظيف</span>`;

                    return `<tr class="table-row-link" onclick="window.location='/vehicles/${v.id}'">
                        <td class="font-mono" style="font-weight:600;">${v.plate_number}</td>
                        <td>${v.owner_name || '<span style="color:var(--text-3)">—</span>'}</td>
                        <td>${v.vehicle_type}</td>
                        <td>${v.make} ${v.model}</td>
                        <td style="color:var(--text-2);">${v.year}</td>
                        <td><span class="badge ${st.cls}">${st.text}</span></td>
                        <td>${vBadge}</td>
                        <td style="display:flex;gap:6px;">
                            <a href="/vehicles/${v.id}" class="btn btn-ghost btn-sm" onclick="event.stopPropagation()">
                                <svg width="14" height="14" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                عرض
                            </a>
                        </td>
                    </tr>`;
                }).join('');

            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:60px 20px;"><svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" style="width:56px;height:56px;display:block;margin:0 auto 12px;opacity:.4;"><circle cx=\"11\" cy=\"11\" r=\"8\"/><line x1=\"21\" y1=\"21\" x2=\"16.65\" y2=\"16.65\"/></svg><div style="font-size:16px;font-weight:600;color:#64748b;margin-bottom:6px;">لا توجد نتائج</div><div style="font-size:13px;color:#94a3b8;">جرّب تغيير معايير البحث</div></td></tr>`;
            }
        }

        function changePage(dir) {
            currentPage = Math.max(1, currentPage + dir);
            loadVehicles();
        }

        function resetFilters() {
            document.getElementById('search-input').value = '';
            document.getElementById('filter-status').value = '';
            document.getElementById('filter-type').value = '';
            currentPage = 1;
            loadVehicles();
        }

        // بحث فوري عند الكتابة
        let searchTimer;
        document.getElementById('search-input').addEventListener('input', function() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => { currentPage = 1; loadVehicles(); }, 150);
        });
        document.getElementById('filter-status').addEventListener('change', () => { currentPage = 1; loadVehicles(); });
        document.getElementById('filter-type').addEventListener('change',  () => { currentPage = 1; loadVehicles(); });

        loadVehicles();
    </script>

</body>
</html>
